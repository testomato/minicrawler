name: minicrawler

# docker compose pull httpbin
# docker compose up -d httpbin
services:

  httpbin:
    image: mccutchen/go-httpbin
    ports:
      - "80:8080"


  # docker compose build minicrawler-dev
  # docker compose run --rm minicrawler-dev
  minicrawler-dev:
    tty: true
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: minicrawler-dev
    environment:
      - ENVNAME=dev
      - HTTPBIN_URL=http://httpbin:80
    volumes:
      - ".:/minicrawler"