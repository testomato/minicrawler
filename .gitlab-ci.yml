stages:
  - Build

Build minicrawler container:
  tags: [ shell ]
  stage: Build
  before_script:
    - echo $CI_DEPLOY_PASSWORD | docker login $CI_REGISTRY -u $CI_DEPLOY_USER --password-stdin
    - docker buildx ls | grep ${CI_PROJECT_ROOT_NAMESPACE}-builder || docker buildx create --use --bootstrap --name ${CI_PROJECT_ROOT_NAMESPACE}-builder
    - docker buildx use ${CI_PROJECT_ROOT_NAMESPACE}-builder
  script:
    - docker buildx bake --file docker-bake.hcl minicrawler --push
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH